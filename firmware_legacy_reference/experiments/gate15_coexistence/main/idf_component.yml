# Managed components for Wi-Fi on ESP32-P4 (no native radio).
# ESP-Hosted runs the Wi-Fi stack on the ESP32-C6 and esp_wifi_remote exposes the
# standard esp_wifi.h API to the P4 host. Pin the versions that match the board's
# C6 slave firmware during Fase 0 (Gate 8/9) - the values below are placeholders.
dependencies:
  idf: ">=5.5.0"
  espressif/esp_wifi_remote: "*"
  espressif/esp_hosted: "*"
  # Official Waveshare BSP for this exact board (Gates 5/6: display EK79007 +
  # touch GT911, pins and init confirmed - docs/HARDWARE.md).
  waveshare/esp32_p4_wifi6_touch_lcd_7b: "^2.0.0"
  # Touch driver types/functions used directly in gate15_main.c - the BSP
  # depends on esp_lcd_touch_gt911 internally but doesn't expose it
  # transitively, so declare it here too.
  espressif/esp_lcd_touch_gt911: "*"
  espressif/esp_lcd_touch: "*"
